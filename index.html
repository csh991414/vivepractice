<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Impact Analyzer - Daily News</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9229217385429689"
     crossorigin="anonymous"></script>
  <link href='/style.css' rel='stylesheet'>
</head>
<body class="light-mode">
  <nav class="navbar">
    <div class="logo">StockInsight KR</div>
    <div class="nav-controls">
      <a href="/partnership.html" class="nav-link">제휴 문의</a>
      <button id="refresh-news">새 기사 불러오기</button>
      <button id="theme-toggle">테마 변경</button>
    </div>
  </nav>

  <main class="container">
    <header class="dashboard-header">
      <h1>오늘의 아침 주요 뉴스 & 종목 영향 예측</h1>
      <p id="current-date"></p>
    </header>

    <section class="news-section">
      <h2 class="section-title">🚀 시장 주도 섹터 (반도체/AI/테크)</h2>
      <div id="tech-news-grid" class="news-grid">
        <div class="loading-state">테크 뉴스를 불러오는 중...</div>
      </div>
    </section>

    <section class="news-section" style="margin-top: 3rem;">
      <h2 class="section-title">🌍 국제 정세 & 거시 경제 (미국/중국/전쟁)</h2>
      <div id="global-news-grid" class="news-grid">
        <div class="loading-state">국제 뉴스를 불러오는 중...</div>
      </div>
    </section>

    <section class="comments-section">
      <div id="disqus_thread"></div>
      <script>
          var disqus_config = function () {
            this.page.url = window.location.href.split('#')[0];  // 현재 페이지 URL (해시 제외)
            this.page.identifier = 'stockinsight-kr-v1'; // 유니크한 식별자 설정
          };
          (function() { // DON'T EDIT BELOW THIS LINE
          var d = document, s = d.createElement('script');
          s.src = 'https://vive-2.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
  </main>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
