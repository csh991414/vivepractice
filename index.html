<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Impact Analyzer - Daily News</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body class="light-mode">
  <nav class="navbar">
    <div class="logo">StockInsight KR</div>
    <div class="nav-controls">
      <button id="refresh-news">새 기사 불러오기</button>
      <button id="theme-toggle">테마 변경</button>
    </div>
  </nav>

  <main class="container">
    <header class="dashboard-header">
      <h1>오늘의 아침 주요 뉴스 & 종목 영향 예측</h1>
      <p id="current-date"></p>
    </header>

    <div id="news-grid" class="news-grid">
      <!-- News cards will be injected here via JS -->
      <div class="loading-state">뉴스를 불러오는 중...</div>
    </div>
  </main>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
