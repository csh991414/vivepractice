<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제휴 문의 - StockInsight KR</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body class="light-mode">
  <nav class="navbar">
    <div class="logo"><a href="/" style="text-decoration: none; color: inherit;">StockInsight KR</a></div>
    <div class="nav-controls">
      <a href="/" class="nav-link">홈으로</a>
      <button id="theme-toggle">테마 변경</button>
    </div>
  </nav>

  <main class="container">
    <section class="form-container">
      <header class="dashboard-header">
        <h1>제휴 문의</h1>
        <p>StockInsight KR과 함께 성장할 파트너를 찾습니다.</p>
      </header>

      <form action="https://formspree.io/f/mjgaybdr" method="POST" class="partnership-form">
        <div class="form-group">
          <label for="name">성함 / 담당자명</label>
          <input type="text" id="name" name="name" placeholder="성함을 입력해주세요" required>
        </div>

        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="_replyto" placeholder="example@domain.com" required>
        </div>

        <div class="form-group">
          <label for="company">회사명 / 소속</label>
          <input type="text" id="company" name="company" placeholder="회사명을 입력해주세요">
        </div>

        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="5" placeholder="제휴 관련 상세 내용을 입력해주세요" required></textarea>
        </div>

        <!-- Formspree hidden fields -->
        <input type="hidden" name="_subject" value="새로운 제휴 문의가 접수되었습니다!">
        
        <button type="submit" class="submit-btn">제휴 문의 보내기</button>
      </form>
    </section>
  </main>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
